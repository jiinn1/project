version: "3.9"
services:
  db:
    image: postgres:15
    container_name: myapp-prod-db
    env_file:
      - .env.prod
    restart: always
    volumes:
      - db-prod-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: myapp-backend
    env_file:
      - .env.prod
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: myapp-frontend
    env_file:
      - .env.prod
    ports:
      - "80:3000"
    depends_on:
      - backend
    restart: always

volumes:
  db-prod-data: