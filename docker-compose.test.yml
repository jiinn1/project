version: "3.9"
services:
  db:
    image: postgres:15
    container_name: myapp-test-db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - db-test-data:/var/lib/postgresql/data

  backend-tests:
    build:
      context: ./backend
    container_name: backend-tests
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: mvn test   # uruchamia testy JUnit

  frontend-tests:
    build:
      context: ./frontend
    container_name: frontend-tests
    env_file:
      - .env
    depends_on:
      - backend-tests
    command: npm test   # uruchamia testy frontendowe

volumes:
  db-test-data: