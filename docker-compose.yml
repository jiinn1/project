services:
  bazka:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
    
  backend:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      bazka:
        condition: service_healthy

  frontend:
      build:
        context: ./frontend
        target: dev
      volumes:
        - ./frontend:/app
        - /app/node_modules
      env_file:
        - .env
      ports:
        - "5173:5173"
      depends_on:
        - backend

volumes:
  db-data: